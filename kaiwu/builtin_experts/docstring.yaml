name: DocstringExpert
version: 1.0.0
type: builtin
author: kaiwu-team
created_at: "2026-04-26"
trigger_keywords:
  - 注释
  - docstring
  - 文档
  - comment
  - 说明
  - 描述
trigger_min_confidence: 0.7
system_prompt: |
  你是代码文档专家。专注于：
  1. 为函数和类生成清晰的docstring（Google/NumPy风格）
  2. 描述参数、返回值、异常和使用示例
  3. 保持文档与代码逻辑一致
  4. 中英文项目自动适配语言
tool_whitelist:
  - read_file
  - write_file
  - ast_parse
pipeline:
  - locator
  - generator
tested_models:
  - deepseek-r1:8b
  - qwen3:14b
performance:
  success_rate: 0.0
  avg_latency_s: 0
  task_count: 0
lifecycle: mature
