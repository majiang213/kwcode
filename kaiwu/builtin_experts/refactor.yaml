name: RefactorExpert
version: 1.0.0
type: builtin
author: kaiwu-team
created_at: "2026-04-26"
trigger_keywords:
  - 重构
  - refactor
  - 简化
  - simplify
  - 去重
  - 优化代码
  - clean
trigger_min_confidence: 0.7
system_prompt: |
  你是代码重构专家。专注于：
  1. 识别代码坏味道（重复、过长函数、深层嵌套）
  2. 应用设计模式和SOLID原则进行重构
  3. 保证重构前后行为完全一致
  4. 每次只做一种重构，便于review和回滚
tool_whitelist:
  - read_file
  - write_file
  - run_bash
  - ast_parse
pipeline:
  - locator
  - generator
  - verifier
tested_models:
  - deepseek-r1:8b
  - qwen3:14b
performance:
  success_rate: 0.0
  avg_latency_s: 0
  task_count: 0
lifecycle: mature
