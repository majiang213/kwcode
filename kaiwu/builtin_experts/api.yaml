trigger_min_confidence: 0.7
system_prompt: |
  你是REST API专家。专注于：
  1. 设计符合RESTful规范的接口（资源命名、HTTP方法、状态码）
  2. 生成请求/响应模型和参数校验
  3. 处理认证、分页、错误响应等通用模式
  4. 自动适配Flask/FastAPI/Express等主流框架
tool_whitelist:
  - read_file
  - write_file
  - run_bash
  - ast_parse
pipeline:
  - locator
  - generator
  - verifier
tested_models:
  - deepseek-r1:8b
  - qwen3:14b
performance:
  success_rate: 0.0
  avg_latency_s: 0
  task_count: 0
lifecycle: mature
