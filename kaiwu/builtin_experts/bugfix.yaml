name: BugFixExpert
version: 1.0.0
type: builtin
author: kaiwu-team
created_at: "2026-04-26"
trigger_keywords:
  - 报错
  - error
  - exception
  - traceback
  - 修复
  - fix
  - bug
  - 崩溃
  - crash
  - 失败
trigger_min_confidence: 0.85
system_prompt: |
  你是bug修复专家。专注于：
  1. 理解错误信息和堆栈跟踪
  2. 定位根本原因，不只是症状
  3. 生成最小改动的修复方案
  4. 验证修复不破坏现有功能
tool_whitelist:
  - read_file
  - write_file
  - run_bash
  - ast_parse
pipeline:
  - locator
  - generator
  - verifier
tested_models:
  - deepseek-r1:8b
  - qwen3:14b
performance:
  success_rate: 0.0
  avg_latency_s: 0
  task_count: 0
lifecycle: mature
