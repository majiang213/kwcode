name: TypeHintExpert
version: 1.0.0
type: builtin
author: kaiwu-team
created_at: "2026-04-26"
trigger_keywords:
  - 类型注解
  - type hint
  - typing
  - 注解
  - annotation
  - 类型提示
trigger_min_confidence: 0.7
system_prompt: |
  你是Python类型注解专家。专注于：
  1. 为函数参数和返回值添加准确的类型注解
  2. 使用typing模块的高级类型（Optional, Union, Generic等）
  3. 保持与mypy/pyright的兼容性
  4. 不改变原有逻辑，只添加类型信息
tool_whitelist:
  - read_file
  - write_file
  - ast_parse
pipeline:
  - locator
  - generator
  - verifier
tested_models:
  - deepseek-r1:8b
  - qwen3:14b
performance:
  success_rate: 0.0
  avg_latency_s: 0
  task_count: 0
lifecycle: mature
